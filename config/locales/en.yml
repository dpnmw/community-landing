en:
  site_settings:
    # ── Master Switch ──
    community_landing_enabled: "Enable the community landing page."

    # ── Layout ──
    section_order: "━━ LAYOUT ━━ — Order of content sections. Use the arrows to reorder. Available sections: hero, stats, about, participation, topics, groups, app_cta. Navbar and footer are always fixed."

    # ── Custom CSS ──
    custom_css: "━━ CUSTOM CSS ━━ — Raw CSS injected after all plugin styles. Use for overrides and tweaks. No style tags needed."

    # ── SEO & Meta ──
    meta_description: "━━ SEO & META ━━ — Custom meta description for search engines and social sharing. If blank, the hero subtitle is used."
    og_image_url: "Custom Open Graph image URL for social sharing (1200×630px recommended). If blank, the site logo is used."
    favicon_url: "Custom favicon URL (.ico, .png, .svg). If blank, the browser default is used."
    json_ld_enabled: "Add JSON-LD structured data (Organization + WebSite schema) for search engines."

    # ── Branding: Logo ──
    logo_dark_url: "━━ BRANDING ━━ — Logo image URL for dark mode. Displayed in the navbar and footer. Leave blank to show the site name as text."
    logo_light_url: "Logo image URL for light mode. If not set, the dark logo is used for both themes."
    logo_height: "Logo height in pixels (16–80). Applies to both the navbar and footer logos."
    logo_use_accent_color: "Tint the logo to match the accent color. Works best with monochrome SVG or PNG logos."
    footer_logo_url: "Override logo specifically for the footer. If not set, the navbar logo is reused."

    # ── Appearance: Color Scheme ──
    accent_color: "━━ GLOBAL COLORS ━━ — Primary accent color used across the page: buttons, links, highlights, gradients, and stat icons. Hex value (e.g. #d4a24e)."
    accent_hover_color: "Accent color on hover states. Should be slightly lighter or darker than the primary accent. Hex value."
    dark_bg_color: "Overall page background color for dark mode. Hex value."
    light_bg_color: "Overall page background color for light mode. Hex value."
    orb_color: "Color of the decorative background orbs. Leave blank to use the accent color."
    orb_opacity: "Opacity of the background orbs (0–100). Default: 50."

    # ── Scroll Animations ──
    scroll_animation: "━━ SCROLL ANIMATIONS ━━ — How sections animate into view on scroll. Options: fade_up, fade_in, slide_left, slide_right, zoom_in, flip_up, or none."

    # ── Fonts ──
    google_font_name: "━━ FONTS ━━ — Google Font family name for body text. Must match exact Google Fonts name (e.g. 'Inter', 'Poppins'). Default: Outfit."
    title_font_name: "Separate Google Font for section titles and headings. Leave blank to use the body font. Must match exact Google Fonts name."

    # ── Preloader ──
    preloader_enabled: "━━ PRELOADER ━━ — Show a full-screen loading overlay with logo and progress counter while the page loads."
    preloader_logo_url: "Custom logo image for the preloader. Leave blank to use the site logo."
    preloader_bg_dark: "Preloader background color for dark mode. Leave blank for default (matches site background)."
    preloader_bg_light: "Preloader background color for light mode."
    preloader_text_color_dark: "Percentage counter text color for dark mode."
    preloader_text_color_light: "Percentage counter text color for light mode."
    preloader_logo_color: "Logo color override. Works with single-color SVG logos. Leave blank for white (dark mode) or inherits text color."
    preloader_bar_color: "Progress bar color. Leave blank to use the accent color."
    preloader_min_duration: "Minimum time (ms) the preloader is shown, even if loading finishes sooner. Prevents a flash on fast connections. Default: 800."

    # ── Icons ──
    icon_library: "━━ ICONS ━━ — Icon library for buttons and section titles. 'fontawesome' loads FontAwesome 6 Free; 'google' loads Google Material Symbols Outlined. Use the pipe syntax in labels: \"icon_name | Label\"."

    # ── 1. Navbar ──
    navbar_signin_label: "━━ ROW 1: NAVBAR ━━ — Fixed navigation bar at the top with logo, theme toggle, sign-in link, and join button. This setting controls the sign-in link text."
    navbar_signin_enabled: "Show the sign-in link in the navbar."
    navbar_signin_color_dark: "Sign-in link color. Dark (left) and light (right) pickers. Leave blank for default."
    navbar_signin_color_light: "Light mode color for the sign-in link."
    navbar_join_label: "Text for the join/register CTA button in the navbar."
    navbar_join_enabled: "Show the join/register button in the navbar."
    navbar_join_color_dark: "Join button background color. Dark (left) and light (right) pickers. Leave blank for accent color."
    navbar_join_color_light: "Light mode background for the join button."
    navbar_bg_color: "Custom background color for the navbar when scrolled. Leave blank for the default frosted glass effect."
    navbar_border_style: "Border style at the bottom of the navbar when scrolled."
    social_twitter_url: "━━ SOCIAL LINKS ━━ — Twitter / X profile URL. Leave blank to hide. Icons appear in the navbar before the auth buttons."
    social_facebook_url: "Facebook page or profile URL. Leave blank to hide."
    social_instagram_url: "Instagram profile URL. Leave blank to hide."
    social_youtube_url: "YouTube channel URL. Leave blank to hide."
    social_tiktok_url: "TikTok profile URL. Leave blank to hide."
    social_github_url: "GitHub organization or profile URL. Leave blank to hide."

    # ── 2. Hero Section ──
    hero_title: "━━ ROW 2: HERO ━━ — Large welcome area at the top with headline, subtitle, CTA buttons, and optional imagery. This is the main headline text."
    hero_title_size: "Hero title font size in pixels. 0 = use default responsive size."
    hero_accent_word: "Which word in the title gets the accent shimmer animation. 0 = last word (default). 1 = first word, 2 = second word, etc."
    hero_subtitle: "Supporting text below the hero headline. Describe your community's purpose or value proposition."
    hero_card_enabled: "Display the hero content inside a rounded card container with border and shadow. When off, the hero uses a flat full-width layout."
    hero_image_first: "Show the hero image above the text on mobile and to the left on desktop. When off, text appears first (default)."
    hero_image_weight: "Image size weight (1–3). Higher values give the image more space relative to the text. Default: 1 (equal split)."
    hero_background_image_url: "Full-bleed background image behind the hero section. In card mode, fills the card with a dark overlay. In flat mode, covers the entire section."
    hero_image_url: "Single hero image displayed on the right side of the hero. Use the upload button or paste a URL."
    hero_multiple_images_enabled: "Enable multiple hero images (up to 5) that rotate randomly on each page load. Disables the single image upload."
    hero_image_urls: "Images displayed on the right side of the hero. Paste a URL and click Create to add. Up to 5 — a random one is shown on each page load."
    hero_image_max_height: "Maximum height in pixels for the hero image (100–1200)."
    hero_primary_button_enabled: "Show the primary CTA button in the hero section."
    hero_primary_button_label: "Text on the primary (filled, accent-colored) CTA button."
    hero_primary_button_url: "URL the primary button links to. Use a relative path like /latest or an absolute URL."
    hero_secondary_button_enabled: "Show the secondary CTA button in the hero section."
    hero_secondary_button_label: "Text on the secondary (outlined) CTA button."
    hero_secondary_button_url: "URL the secondary button links to."
    hero_primary_btn_color_dark: "Primary button background color. Dark (left) and light (right) pickers. Leave blank for accent color."
    hero_primary_btn_color_light: "Light mode background for the primary button."
    hero_secondary_btn_color_dark: "Secondary button background color. Dark (left) and light (right) pickers. Leave blank for default glass style."
    hero_secondary_btn_color_light: "Light mode background for the secondary button."
    hero_video_upload: "Upload a video file to Discourse. Check your site's allowed file types and max file size before uploading."
    hero_video_url_enabled: "Use an external video URL instead of uploading a file."
    hero_video_url: "URL for a hero video. Supports MP4 and YouTube links. A play button appears in the hero area; clicking opens a lightbox modal with the video."
    hero_video_button_color: "Custom background color for the hero video play button. Leave blank to use the accent color."
    hero_video_blur_on_hover: "Apply a blur effect to the hero image when hovering the play button."
    hero_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    hero_bg_light: "Light mode background for the hero section."
    hero_min_height: "Minimum height for the hero section in pixels. Set to 0 for auto height."
    hero_border_style: "Border style at the bottom of the hero section."
    hero_card_bg_dark: "Hero card overlay background. Dark (left) and light (right) color pickers. Only applies in card mode. Leave blank for default glass effect."
    hero_card_bg_light: "Light mode background for the hero card overlay."
    hero_card_opacity: "Opacity of the hero card background (0 to 1, default 0.85). Lower values make the card more transparent, showing the background image through."

    # ── 3. Stats Section ──
    stats_enabled: "━━ ROW 3: PREMIUM STATS ━━ — Show or hide the entire stats section."
    stat_labels_enabled: "Show text labels below stat counters (e.g. 'Members', 'Topics'). When off, only numbers and icons are displayed."
    stats_title_enabled: "Show the section heading above the stats row. Turn off to display only the stat cards."
    stats_title: "Section heading text above the stats row."
    stat_card_style: "Visual style for stat cards: rectangle (sharp corners), rounded (soft corners), pill (fully rounded), or minimal (no background/border)."
    stat_icon_color: "Color for all stat counter icons. Hex value (e.g. #d4a24e)."
    stat_icon_bg_color: "Background color behind each stat icon. Leave blank for a subtle accent tint."
    stat_icon_shape: "Shape of the icon background: circle or rounded square."
    stat_counter_color: "Color for the stat counter numbers. Leave blank for default text color."
    stat_members_label: "Custom label for the Members stat card."
    stat_topics_label: "Custom label for the Topics stat card."
    stat_posts_label: "Custom label for the Posts stat card."
    stat_likes_label: "Custom label for the Likes stat card."
    stat_chats_label: "Custom label for the Chats stat card. Shows total chat messages if the Chat plugin is active."
    stat_round_numbers: "Round large numbers for a cleaner display: 1000 becomes 1K, 12345 becomes 12.3K, 1234567 becomes 1.2M."
    stat_card_bg_dark: "Stat card background color. Dark (left) and light (right) pickers. Leave blank for default card styling."
    stat_card_bg_light: "Light mode background for stat cards."
    stats_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    stats_bg_light: "Light mode background for the stats section."
    stats_min_height: "Minimum height for the stats section in pixels. Set to 0 for auto height."
    stats_border_style: "Border style at the bottom of the stats section."
    stats_title_size: "Stats section title font size in pixels. 0 = use default."

    # ── 4. About Section ──
    about_enabled: "━━ ROW 4: ABOUT ━━ — Show the About section: a card with bold heading, decorative quote icon, community description, and author attribution (avatar, name, role)."
    about_heading_enabled: "Show the bold heading text at the top of the About card. Turn off to start with the quote icon and description."
    about_heading: "The heading text at the top of the About card (e.g. 'About Community', 'Our Story')."
    about_title: "Author or community name shown in the card's bottom attribution, next to the avatar."
    about_role: "Subtitle below the author name (e.g. 'Community Manager'). If blank, the site name is used."
    about_body: "Main body text for the About card. Supports basic HTML: p, a, strong, em, ul, li, br."
    about_image_url: "Small avatar image shown next to the author name. Square images work best."
    about_card_color_dark: "About card background color. Dark (left) and light (right) pickers. Leave blank for default theme color."
    about_card_color_light: "Light mode background for the About card."
    about_background_image_url: "Background image layered on top of the card color. Use a subtle pattern or texture."
    about_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    about_bg_light: "Light mode background for the about section."
    about_min_height: "Minimum height for the about section in pixels. Set to 0 for auto height."
    about_border_style: "Border style at the bottom of the about section."
    about_title_size: "About section heading font size in pixels. 0 = use default."

    # ── 5. Trending Discussions ──
    topics_enabled: "━━ ROW 5: TRENDING ━━ — Show the Trending Discussions section: a horizontally scrollable row of topic cards showing the most active discussions. Each card displays category badge, title, reply count, and like count — all live data. Supports drag-to-scroll and native swipe."
    topics_title_enabled: "Show the section heading above the trending topic cards."
    topics_title: "Heading text above the scrollable topic cards."
    topics_count: "Number of trending topic cards to display."
    topics_card_bg_dark: "Topic card background color. Dark (left) and light (right) pickers. Leave blank for default card styling."
    topics_card_bg_light: "Light mode background for topic cards."
    topics_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    topics_bg_light: "Light mode background for the trending section."
    topics_min_height: "Minimum height for the trending section in pixels. Set to 0 for auto height."
    topics_border_style: "Border style at the bottom of the trending section."
    topics_title_size: "Trending section title font size in pixels. 0 = use default."

    # ── 6. Hero Creators ──
    contributors_enabled: "Show top 3 creators in the hero section with gold, silver, and bronze rank badges."
    contributors_title: "Heading text above the creators list (e.g. 'Top Creators', 'Community Leaders')."
    contributors_title_enabled: "Show the heading above the creators list."
    contributors_count_label: "Label shown before each creator's count (e.g. 'Cheers', 'Points'). Leave blank for no prefix."
    contributors_count_label_enabled: "Show the count label prefix before each creator's activity count."
    contributors_alignment: "Horizontal alignment of the creators list: center or left."
    contributors_pill_max_width: "Maximum width in pixels for each creator pill card (200–600)."
    contributors_pill_bg_dark: "Creator pill background color. Dark (left) and light (right) pickers. Leave blank for default glass styling."
    contributors_pill_bg_light: "Light mode background for creator pills."
    contributors_days: "Lookback period in days for calculating top contributors."
    contributors_count: "Number of top contributors to fetch (top 3 are shown in the hero, 4–10 appear in the Participation section)."

    # ── 5b. Participation ──
    participation_enabled: "━━ ROW 5b: PARTICIPATION ━━ — Show the Participation section: testimonial-style cards displaying leaderboard positions 4–10 with their public bio/summary. Only users who have written a bio are shown. Uses the same contributor data and lookback period as the Hero Creators."
    participation_title_enabled: "Show the section heading above the participation cards."
    participation_title: "Heading text above the participation cards."
    participation_bio_max_length: "Maximum number of characters to show from each user's bio (50–500). Longer bios are truncated with an ellipsis."
    participation_icon_color: "Color for the decorative quote icon on each participation card. Leave blank to use the accent color."
    participation_card_bg_dark: "Participation card background color. Dark (left) and light (right) pickers. Leave blank for default card styling."
    participation_card_bg_light: "Light mode background for participation cards."
    participation_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    participation_bg_light: "Light mode background for the participation section."
    participation_min_height: "Minimum height for the participation section in pixels. Set to 0 for auto height."
    participation_border_style: "Border style at the bottom of the participation section."
    participation_title_size: "Participation section title font size in pixels. 0 = use default."

    # ── 7. Community Spaces ──
    groups_enabled: "━━ ROW 7: SPACES ━━ — Show the Community Spaces section: a grid of colorful cards representing your public groups. Each card shows a colored icon (with group's first letter or flair), group name, and member count. Only public, non-automatic groups are shown."
    groups_title_enabled: "Show the section heading above the group cards."
    groups_title: "Heading text above the group cards."
    groups_count: "Number of group cards to display."
    groups_selected: "Show only specific groups. Enter group names separated by pipes (e.g. designers|developers|artists). Leave blank to auto-select public groups."
    groups_card_bg_dark: "Space card background color. Dark (left) and light (right) pickers. Leave blank for default card styling."
    groups_card_bg_light: "Light mode background for space cards."
    splits_background_image_url: "Background image for the splits section (Groups + FAQ row)."
    splits_bg_dark: "Background color for the splits section (dark mode)."
    splits_bg_light: "Background color for the splits section (light mode)."
    splits_min_height: "Minimum height in pixels for the splits section. 0 = auto."
    groups_show_description: "Show group description text (from the group's bio) below the group name on each card."
    groups_description_max_length: "Maximum characters for group description text (30–500). Longer descriptions are truncated."
    groups_title_size: "Spaces section title font size in pixels. 0 = use default."

    # ── 7b. FAQ Accordion ──
    faq_enabled: "━━ FAQ ACCORDION ━━ — Show an FAQ accordion alongside the Spaces section. Only one item opens at a time."
    faq_title_enabled: "Show a heading above the FAQ accordion."
    faq_title: "Heading text above the FAQ accordion."
    faq_items: 'FAQ items as a JSON array. Format: [{"q":"Question","a":"Answer"}]. HTML is supported in answers.'
    faq_title_size: "FAQ section title font size in pixels. 0 = use default."
    faq_card_bg_dark: "FAQ card background color (dark mode). Leave blank for default card styling."
    faq_card_bg_light: "FAQ card background color (light mode). Leave blank for default."
    faq_mobile_max_height: "Max height of FAQ container on mobile (px). Content scrolls if it overflows. 0 = no limit."

    # ── 8. App Download CTA ──
    show_app_ctas: "━━ ROW 8: APP CTA ━━ — Show the App Download CTA: a gradient banner promoting your mobile app with headline, subtitle, download badges (App Store / Google Play), and optional promotional image. Requires at least one app store URL."
    ios_app_url: "Apple App Store URL for your iOS app. Leave blank to hide the iOS badge."
    android_app_url: "Google Play Store URL for your Android app. Leave blank to hide the Android badge."
    ios_app_badge_image_url: "Replace the iOS badge button with a custom image (e.g. official App Store badge). Leave blank for default."
    android_app_badge_image_url: "Replace the Android badge button with a custom image (e.g. official Google Play badge). Leave blank for default."
    app_badge_height: "Height of app download badges in pixels (30–80)."
    app_badge_style: "Badge border-radius: rounded (soft corners), pill (fully rounded), or square (minimal rounding)."
    app_cta_headline: "Bold headline text in the app download banner."
    app_cta_subtext: "Supporting text below the headline."
    app_cta_gradient_start_dark: "Gradient start color. Dark (left) and light (right) pickers. Leave blank for accent color."
    app_cta_gradient_start_light: "Light mode gradient start color."
    app_cta_gradient_mid_dark: "Gradient middle color. Dark (left) and light (right) pickers. Leave blank for accent hover color."
    app_cta_gradient_mid_light: "Light mode gradient middle color."
    app_cta_gradient_end_dark: "Gradient end color. Dark (left) and light (right) pickers. Leave blank for accent hover color."
    app_cta_gradient_end_light: "Light mode gradient end color."
    app_cta_image_url: "Promotional image on the right side of the CTA (e.g. phone mockup). PNG for transparent backgrounds."
    app_cta_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    app_cta_bg_light: "Light mode background for the app CTA section."
    app_cta_min_height: "Minimum height for the app CTA section in pixels. Set to 0 for auto height."
    app_cta_border_style: "Border style at the bottom of the app CTA section."
    app_cta_title_size: "App CTA headline font size in pixels. 0 = use default."

    # ── 9. Footer ──
    footer_description: "━━ ROW 9: FOOTER ━━ — Bottom of the page with logo, navigation links, copyright, and optional description. This adds a description paragraph above the footer bar."
    footer_text: "Optional HTML text inside the footer bar. Supports: p, a, strong, em, ul, li, br."
    footer_links: 'Footer navigation links as a JSON array. Format: [{"label":"Terms","url":"/tos"},{"label":"Privacy","url":"/privacy"}].'
    footer_bg_dark: "Section background color override. Dark (left) and light (right) color pickers. Leave blank for default."
    footer_bg_light: "Light mode background for the footer."
    footer_text_color_dark: "Footer text color for dark mode. Applies to site name, links, copyright, and description. Leave blank for default."
    footer_text_color_light: "Footer text color for light mode."
    footer_border_style: "Border style at the top of the footer bar."
