plugins:
  # ══════════════════════════════════════════
  # Master Switch
  # ══════════════════════════════════════════
  community_landing_enabled:
    default: true
    type: bool

  # ══════════════════════════════════════════
  # Branding: Logo
  # ══════════════════════════════════════════
  logo_dark_url:
    default: ""
    type: string
  logo_light_url:
    default: ""
    type: string
  logo_height:
    default: 30
    type: integer
    min: 16
    max: 80
  footer_logo_url:
    default: ""
    type: string

  # ══════════════════════════════════════════
  # Appearance: Color Scheme
  # ══════════════════════════════════════════
  accent_color:
    default: "d4a24e"
    type: color
  accent_hover_color:
    default: "c4922e"
    type: color
  dark_bg_color:
    default: "06060f"
    type: color
  light_bg_color:
    default: "faf6f0"
    type: color

  # ══════════════════════════════════════════
  # Scroll Animations & Effects
  # ══════════════════════════════════════════
  scroll_animation:
    default: "fade_up"
    type: enum
    choices:
      - fade_up
      - fade_in
      - slide_left
      - slide_right
      - zoom_in
      - flip_up
      - none
  
  staggered_reveal_enabled:
    default: true
    type: bool
  
  dynamic_background_enabled:
    default: true
    type: bool

  mouse_parallax_enabled:
    default: true
    type: bool

  scroll_progress_enabled:
    default: true
    type: bool

  # ══════════════════════════════════════════
