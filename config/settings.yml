  # ══════════════════════════════════════════
  navbar_signin_label:
    default: "Sign In"
    type: string
  navbar_join_label:
    default: "Get Started"
    type: string
  navbar_bg_color:
    default: ""
    type: color
  navbar_border_style:
    default: "none"
    type: enum
    choices:
      - none
      - solid
      - dashed
      - dotted

